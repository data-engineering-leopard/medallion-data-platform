table: leads
input_path: data/bronze/leads
output_path: data/silver/leads
quarantine_path: quarantine/silver/leads
scd2: true
scd2_key: lead_id
effective_from_column: updated_date
effective_from_fallback_column: created_date
scd2_track_columns:
  - status
  - email
  - country
drop_null_columns:
  - last_name
  - company
uppercase_columns: []
lowercase_columns:
  - status
  - lead_source