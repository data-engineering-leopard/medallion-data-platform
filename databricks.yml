bundle:
  name: medallion-data-platform

variables:
  bronze_path:
    default: /mnt/data/bronze
  silver_path:
    default: /mnt/data/silver
  gold_path:
    default: /mnt/data/gold
  quarantine_path:
    default: /mnt/quarantine/silver
  spark_version:
    default: "15.4.x-scala2.12"
  node_type_id:
    default: Standard_DS3_v2
  num_workers:
    default: 2

targets:
  dev:
    mode: development
    workspace:
      host: ${bundle.target}
    variables:
      bronze_path: /mnt/dev/bronze
      silver_path: /mnt/dev/silver
      gold_path: /mnt/dev/gold
      quarantine_path: /mnt/dev/quarantine/silver

x-default-cluster: &default_cluster
  spark_version: ${var.spark_version}
  node_type_id: ${var.node_type_id}
  num_workers: ${var.num_workers}

resources:
  jobs:
    daily_pipeline:
      name: "Daily Medallion Pipeline"

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/London"
        pause_status: PAUSED

#      email_notifications:
#        on_failure:
#          - your@email.com
#        on_success:
#          - your@email.com

      tasks:

        # ===========================
        # BRONZE TASKS
        # ===========================

        - task_key: bronze_online_tcg
          description: "Ingest raw customers and orders from Online TCG"
          python_wheel_task:
            package_name: my_project
            entry_point: bronze_online_tcg
            parameters:
              - "--customers-input=/mnt/raw/customers.csv"
              - "--orders-input=/mnt/raw/orders.csv"
              - "--output-path=${var.bronze_path}"
          new_cluster: *default_cluster

        - task_key: bronze_salesforce
          description: "Ingest raw leads from Salesforce"
          python_wheel_task:
            package_name: my_project
            entry_point: bronze_salesforce
            parameters:
              - "--leads-input=/mnt/raw/sf_leads.csv"
              - "--output-path=${var.bronze_path}"
          new_cluster: *default_cluster

        # ===========================
        # SILVER TASK
        # ===========================

        - task_key: silver_task
          description: "Clean and validate all bronze tables"
          depends_on:
            - task_key: bronze_online_tcg
            - task_key: bronze_salesforce
          python_wheel_task:
            package_name: my_project
            entry_point: silver_task
            parameters:
              - "--config-path=assets/silver"
          new_cluster: *default_cluster

        # ===========================
        # GOLD TASKS
        # ===========================

        - task_key: gold_dim_customers
          description: "Build dim_customers Gold dimension"
          depends_on:
            - task_key: silver_task
          python_wheel_task:
            package_name: my_project
            entry_point: dim_customers
            parameters:
              - "--input-path=${var.silver_path}/customers"
              - "--output-path=${var.gold_path}/dim_customers"
          new_cluster: *default_cluster

        - task_key: gold_fact_orders
          description: "Build fact_orders Gold fact table"
          depends_on:
            - task_key: gold_dim_customers
          python_wheel_task:
            package_name: my_project
            entry_point: fact_orders
            parameters:
              - "--orders-input-path=${var.silver_path}/orders"
              - "--dim-customers-path=${var.gold_path}/dim_customers"
              - "--output-path=${var.gold_path}/fact_orders"
          new_cluster: *default_cluster

        - task_key: gold_dim_leads
          description: "Build dim_leads Gold dimension"
          depends_on:
            - task_key: silver_task
          python_wheel_task:
            package_name: my_project
            entry_point: dim_leads
            parameters:
              - "--input-path=${var.silver_path}/leads"
              - "--output-path=${var.gold_path}/dim_leads"
          new_cluster: *default_cluster
